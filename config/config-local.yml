serviceName: prompt-batch-service

server:
  applicationConnectors:
    - type: http
      port: ${APP_PORT:-8080}
  adminConnectors:
    - type: http
      port: ${ADMIN_PORT:-8081}

logging:
  level: ${LOG_LEVEL:-INFO}
  loggers:
    com.example.promptbatch: DEBUG

# Every Timer/Meter/Counter/Gauge registered in code (client/MeteredInferenceClient,
# worker/MeteredTaskExecutor, the composition root's gauges, plus Dropwizard's built-in JVM
# metrics) is pushed out via these reporters - no separate scrape/agent setup needed.
# - log: periodically dumps every metric to the "metrics" logger, so it's visible right in the
#   console during local development.
# Swapping/adding a `graphite`/`influx-db`/`datadog` reporter here (or the JMX reporter, once
# `io.dropwizard.metrics:metrics-jmx` is on the classpath) is config-only - no code change - by
# the same "swap the implementation behind the seam" principle as everything else (LLD.md §9.7).
metrics:
  frequency: 30 seconds
  reporters:
    - type: log
      logger: metrics
      frequency: 30 seconds

workerPool:
  size: ${WORKER_POOL_SIZE:-8}
  queueCapacity: ${WORKER_POOL_QUEUE_CAPACITY:-10000}

# Small, separate pool that only ever runs prompts re-submitted after being lost to a
# crashed/hung worker (see `recovery:` below + StaleTaskRecoveryService) - kept apart from
# `workerPool` so retries can never starve normal request processing.
retryWorkerPool:
  size: ${RETRY_WORKER_POOL_SIZE:-2}
  queueCapacity: ${RETRY_WORKER_POOL_QUEUE_CAPACITY:-1000}

# Background sweep (postgres store only) that continuously looks for prompts with no result
# that haven't been (re-)attempted in `staleAfterSeconds` - i.e. work lost to a crashed or hung
# worker - and resubmits them to retryWorkerPool. After `maxAttempts` with still no result, the
# prompt is marked permanently failed instead of retried again, so a batch never gets stuck
# forever behind one broken prompt.
recovery:
  enabled: ${RECOVERY_ENABLED:-true}
  intervalSeconds: ${RECOVERY_INTERVAL_SECONDS:-20}
  staleAfterSeconds: ${RECOVERY_STALE_AFTER_SECONDS:-60}
  maxAttempts: ${RECOVERY_MAX_ATTEMPTS:-5}

retry:
  maxRetries: 4
  baseDelayMs: 500
  maxDelayMs: 5000
  jitter: true

mockEndpoint:
  rateLimitProbability: 0.3
  baseLatencyMs: 150

# Same shared Postgres instance as preprod/prod by default (see .env.example /
# README "One shared Postgres instance") - so a local run sees the exact same batch/prompt
# state as everywhere else, no separate local database needed. Set STORE_TYPE=json-file +
# DATABASE_URL="" to fall back to a throwaway local file store instead, if you ever need to work
# fully offline from the shared DB.
store:
  type: ${STORE_TYPE:-postgres}
  directory: ${STORE_DIRECTORY:-./data/batches}
  databaseUrl: ${DATABASE_URL:-}
  maxPoolSize: ${STORE_MAX_POOL_SIZE:-10}

swagger:
  resourcePackage: com.example.promptbatch.api
  title: prompt-batch-service API
  description: Submit batches of AI prompts, track live progress, and fetch aggregated results.
  version: 1.0.0
  schemes: [http]
