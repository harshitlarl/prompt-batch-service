serviceName: prompt-batch-service

server:
  applicationConnectors:
    - type: http
      port: ${APP_PORT:-8080}
  adminConnectors:
    - type: http
      port: ${ADMIN_PORT:-8081}

logging:
  level: ${LOG_LEVEL:-WARN}
  loggers:
    com.example.promptbatch: INFO

# Pushes every registered metric (inference latency/success/rate-limit, task-executor
# throughput/backlog, batch counts, JVM stats) to the "metrics" logger every minute. Point a log
# shipper (Fluentd/Filebeat/CloudWatch agent) at this logger, or swap in a `graphite`/`datadog`
# reporter here, to feed a real dashboard - no code change needed (LLD.md §9.7).
metrics:
  frequency: 1 minute
  reporters:
    - type: log
      logger: metrics
      frequency: 1 minute

workerPool:
  size: ${WORKER_POOL_SIZE:-32}
  queueCapacity: ${WORKER_POOL_QUEUE_CAPACITY:-50000}

# See config-local.yml for what this pool + sweep are for. Kept small and independent of
# workerPool on purpose: however many instances are running (see .do/app.yaml
# instance_count/autoscaling), a burst of retries after an outage never eats into capacity
# reserved for fresh incoming requests.
retryWorkerPool:
  size: ${RETRY_WORKER_POOL_SIZE:-4}
  queueCapacity: ${RETRY_WORKER_POOL_QUEUE_CAPACITY:-5000}

recovery:
  enabled: ${RECOVERY_ENABLED:-true}
  intervalSeconds: ${RECOVERY_INTERVAL_SECONDS:-30}
  staleAfterSeconds: ${RECOVERY_STALE_AFTER_SECONDS:-120}
  maxAttempts: ${RECOVERY_MAX_ATTEMPTS:-5}

retry:
  maxRetries: 6
  baseDelayMs: 500
  maxDelayMs: 15000
  jitter: true

mockEndpoint:
  rateLimitProbability: 0.3
  baseLatencyMs: 150

# Prod always persists durably so batches survive restarts/crashes. Default is
# STORE_TYPE=postgres against the SAME shared Postgres instance local/preprod use (see
# .env.example / README "One shared Postgres instance"), since prod runs multiple instances
# (see .do/app.yaml instance_count/autoscaling) that all need to see the same batch state and be
# able to pick up work left unfinished by a crashed sibling. DATABASE_URL is injected by App
# Platform as ${db.DATABASE_URL} when a database component is attached; set it manually (or
# point at a self-hosted Postgres on the droplet) for other deployment styles.
store:
  type: ${STORE_TYPE:-postgres}
  directory: ${STORE_DIRECTORY:-/data/prompt-batch-service/batches}
  databaseUrl: ${DATABASE_URL:-}
  maxPoolSize: ${STORE_MAX_POOL_SIZE:-10}

swagger:
  resourcePackage: com.example.promptbatch.api
  title: prompt-batch-service API
  description: Submit batches of AI prompts, track live progress, and fetch aggregated results.
  version: 1.0.0
  schemes: [https]
