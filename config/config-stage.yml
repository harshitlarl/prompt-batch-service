serviceName: prompt-batch-service

server:
  applicationConnectors:
    - type: http
      port: ${APP_PORT:-8080}
  adminConnectors:
    - type: http
      port: ${ADMIN_PORT:-8081}

logging:
  level: ${LOG_LEVEL:-INFO}
  loggers:
    com.example.promptbatch: INFO

# Pushes every registered metric (inference latency/success/rate-limit, task-executor
# throughput/backlog, batch counts, JVM stats) to the "metrics" logger every minute. Point a log
# shipper (Fluentd/Filebeat/CloudWatch agent) at this logger, or swap in a `graphite`/`datadog`
# reporter here, to feed a real dashboard - no code change needed (LLD.md §9.7).
metrics:
  frequency: 1 minute
  reporters:
    - type: log
      logger: metrics
      frequency: 1 minute

workerPool:
  size: ${WORKER_POOL_SIZE:-16}
  queueCapacity: ${WORKER_POOL_QUEUE_CAPACITY:-20000}

# See config-local.yml for what this pool + sweep are for.
retryWorkerPool:
  size: ${RETRY_WORKER_POOL_SIZE:-2}
  queueCapacity: ${RETRY_WORKER_POOL_QUEUE_CAPACITY:-2000}

recovery:
  enabled: ${RECOVERY_ENABLED:-true}
  intervalSeconds: ${RECOVERY_INTERVAL_SECONDS:-30}
  staleAfterSeconds: ${RECOVERY_STALE_AFTER_SECONDS:-120}
  maxAttempts: ${RECOVERY_MAX_ATTEMPTS:-5}

retry:
  maxRetries: 5
  baseDelayMs: 500
  maxDelayMs: 8000
  jitter: true

mockEndpoint:
  rateLimitProbability: 0.3
  baseLatencyMs: 150

# Preprod. Same shared Postgres instance as local/prod by default (see .env.example /
# README "One shared Postgres instance"), so preprod always sees exactly the same batch/prompt
# state local and prod do.
store:
  type: ${STORE_TYPE:-postgres}
  directory: ${STORE_DIRECTORY:-/data/prompt-batch-service/batches}
  databaseUrl: ${DATABASE_URL:-}
  maxPoolSize: ${STORE_MAX_POOL_SIZE:-10}

swagger:
  resourcePackage: com.example.promptbatch.api
  title: prompt-batch-service API
  description: Submit batches of AI prompts, track live progress, and fetch aggregated results.
  version: 1.0.0
  schemes: [http]
