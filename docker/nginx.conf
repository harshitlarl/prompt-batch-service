events {}

http {
    # Docker Compose's embedded DNS round-robins "prompt-batch-service" across every replica,
    # so nginx just needs to re-resolve it periodically rather than list IPs explicitly.
    resolver 127.0.0.11 valid=10s;

    server {
        listen 8080;

        location / {
            set $upstream http://prompt-batch-service:8080;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # If a replica is killed mid-request, retry the next one instead of surfacing an
            # error to the caller - the container-crash-retry behavior at the edge.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_connect_timeout 2s;
        }
    }
}
